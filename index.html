<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>INNO Intranet - Dokumenty</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: white; display: flex; }
        .sidebar { width: 250px; background: #111827; height: 100vh; padding: 20px; }
        .main { flex-grow: 1; padding: 30px; }
        .header { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .category { background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; }
        .subcategory { padding: 10px 20px; background: #334155; margin: 5px 0; border-radius: 5px; }
        .file-upload { margin-top: 10px; font-size: 0.8em; }
    </style>
</head>
<body>

<div id="login" style="display:flex; justify-content:center; align-items:center; width:100%; height:100vh;">
    <div style="background:#1e293b; padding:40px; border-radius:12px;">
        <input id="email" placeholder="Email"><br>
        <input id="password" type="password" placeholder="Heslo"><br>
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="app" style="display:none; width:100%;">
    <div class="sidebar">
        <h3>Menu</h3>
        <div class="category" onclick="show('docs')">Dokumenty</div>
    </div>
    <div class="main">
        <div class="header" id="user-info"></div>
        <div id="docs">
            <h2>Štruktúra dokumentov</h2>
            
            <div class="category" onclick="toggle('iso-list')">📁 ISO Úroveň 1</div>
            <div id="iso-list" style="display:none;">
                <div class="subcategory">Politika <div class="file-upload" id="upload-iso-politika"></div><div id="files-iso-politika"></div></div>
                <div class="subcategory">Ciele <div class="file-upload" id="upload-iso-ciele"></div><div id="files-iso-ciele"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { /* tvoja config */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Funkcia na pridanie dokumentu
    function renderUploadZone(l1, l2) {
        const zone = document.getElementById(`upload-${l1}-${l2}`);
        zone.innerHTML = `<input type="text" id="name-${l1}-${l2}" placeholder="Názov súboru">
                          <button onclick="addFile('${l1}', '${l2}')">Pridať</button>`;
    }

    async function addFile(l1, l2) {
        const name = document.getElementById(`name-${l1}-${l2}`).value;
        await db.collection("documents").add({
            categoryL1: l1,
            categoryL2: l2,
            fileName: name,
            timestamp: new Date()
        });
        alert("Súbor pridaný!");
    }

    // Načítanie dokumentov
    db.collection("documents").onSnapshot(snap => {
        snap.forEach(doc => {
            const d = doc.data();
            const div = document.getElementById(`files-${d.categoryL1}-${d.categoryL2}`);
            if(div) div.innerHTML += `<div>📄 ${d.fileName}</div>`;
        });
    });

    // Spustenie zón
    renderUploadZone('iso', 'politika');
    renderUploadZone('iso', 'ciele');

    auth.onAuthStateChanged(u => { if(u) { document.getElementById('login').style.display='none'; document.getElementById('app').style.display='flex'; } });
    async function login() { await auth.signInWithEmailAndPassword(document.getElementById("email").value.trim().toLowerCase(), document.getElementById("password").value); }
</script>
</body>
</html>
