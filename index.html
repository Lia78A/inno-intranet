<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>INNO Intranet - Verzia 58</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; }
        .sidebar { width: 220px; background: #111827; height: 100vh; position: fixed; padding: 20px; }
        .content { margin-left: 260px; padding: 20px; }
        .doc-category { background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; }
        .doc-item { background: #334155; padding: 10px; margin: 5px 0; border-radius: 6px; display: flex; justify-content: space-between; }
        .confirm-btn { background: #10b981; border: none; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .confirmed-status { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>

<div id="login" style="height:100vh; display:flex; justify-content:center; align-items:center;">
    <div class="box" style="background:#1e293b; padding:40px; border-radius:12px;">
        <input id="email" placeholder="Email"><br>
        <input id="password" type="password" placeholder="Heslo"><br>
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="app" style="display:none; display:flex;">
    <div class="sidebar">
        <div onclick="show('dashboard')">Dashboard</div>
        <div onclick="show('docs')">Dokumenty</div>
        <div onclick="logout()">Odhlásiť</div>
    </div>
    <div class="content">
        <div id="dashboard"><h2>Dashboard</h2><div id="welcome"></div></div>
        <div id="docs" style="display:none;">
            <h2>Dokumentácia</h2>
            <div class="doc-category" onclick="toggle('cat-iso')">📁 ISO (Úroveň 1)</div>
            <div id="cat-iso" style="display:none;"><div id="list-iso"></div></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAxjbusE-2s4pVUMS6kCow_8X6u5tX9gE",
        authDomain: "inno-intranet.firebaseapp.com",
        projectId: "inno-intranet",
        storageBucket: "inno-intranet.firebasestorage.app",
        messagingSenderId: "816972324613",
        appId: "1:816972324613:web:81429910b0de1e4cbda16c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadUser(user.email);
        } else {
            document.getElementById('login').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    async function login() {
        try {
            await auth.signInWithEmailAndPassword(document.getElementById("email").value.trim().toLowerCase(), document.getElementById("password").value);
        } catch(e) { alert(e.message); }
    }

    async function loadUser(email) {
        const snap = await db.collection("users").where("email", "==", email.toLowerCase()).get();
        if(!snap.empty) {
            const user = snap.docs[0].data();
            document.getElementById('welcome').innerText = "Vitaj, " + user.name;
            loadDocs(user.email);
        }
    }

    async function loadDocs(email) {
        // Načítanie potvrdených dokumentov
        const logs = await db.collection("logs").where("userEmail", "==", email).get();
        const signedIds = logs.docs.map(l => l.data().docId);

        db.collection("documents").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const data = doc.data();
                const isSigned = signedIds.includes(doc.id);
                html += `<div class="doc-item">
                    <span>${data.fileName}</span>
                    ${isSigned ? '<span class="confirmed-status">✓ Potvrdené</span>' : `<button class="confirm-btn" onclick="confirmDoc('${doc.id}', '${data.fileName}', '${email}')">Potvrdiť</button>`}
                </div>`;
            });
            document.getElementById('list-iso').innerHTML = html;
        });
    }

    async function confirmDoc(id, name, email) {
        await db.collection("logs").add({ docId: id, docName: name, userEmail: email, timestamp: new Date().toLocaleString() });
        location.reload();
    }

    function show(id) {
        document.getElementById('dashboard').style.display = (id === 'dashboard') ? 'block' : 'none';
        document.getElementById('docs').style.display = (id === 'docs') ? 'block' : 'none';
    }
    function toggle(id) { document.getElementById(id).style.display = (document.getElementById(id).style.display === 'block') ? 'none' : 'block'; }
    function logout() { auth.signOut(); }
</script>
</body>
</html>
