<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>INNO Intranet</title>
    <!-- Tu zostáva všetok tvoj CSS štýl a Firebase skripty, ktoré si mala v pôvodnej verzii -->
    <!-- (Pre dĺžku správy som tu ponechal len kľúčovú štruktúru, ktorú vlož do svojho súboru) -->
    <style>
        /* Tvoj pôvodný CSS štýl pre body, sidebar, login, app... */
        body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: white; }
        .sidebar { width: 220px; background: #111827; height: 100vh; position: fixed; }
        .content { margin-left: 240px; padding: 20px; }
        .app { display: none; }
        .login { display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>

<div id="login" class="login">
    <div class="box">
        <h2>INNO Prihlásenie</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Heslo">
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="app" class="app">
    <div class="sidebar">
        <!-- Logo zakódované priamo v kóde (SVG) -->
        <svg width="160" height="40" viewBox="0 0 160 40">
            <text x="10" y="30" fill="#38bdf8" font-size="24" font-weight="bold">NOVIS</text>
        </svg>
        <div class="menu" onclick="show('dashboard')">Dashboard</div>
    </div>
    <div class="content">
        <div id="dashboard"><h2>Vitaj v intranete!</h2></div>
    </div>
</div>

<script>
    // Firebase logika (doplň sem svoju firebaseConfig)
    const firebaseConfig = { /* tvoje údaje */ };
    firebase.initializeApp(firebaseConfig);

    async function login() {
        const email = document.getElementById("email").value.trim().toLowerCase();
        const password = document.getElementById("password").value;
        try {
            await firebase.auth().signInWithEmailAndPassword(email, password);
            location.reload(); // Po úspechu obnoví stránku a načíta plný app
        } catch(e) { alert("Chyba: " + e.message); }
    }
</script>
</body>
</html>
