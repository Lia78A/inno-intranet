<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>INNO Intranet</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #1e293b; padding: 40px; border-radius: 12px; width: 300px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563eb; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        .logo-svg { width: 160px; height: auto; margin-bottom: 20px; fill: #38bdf8; }
    </style>
</head>
<body>

<div id="login" class="box">
    <svg class="logo-svg" viewBox="0 0 160 40">
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold">NOVIS</text>
    </svg>
    
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Heslo">
    <button onclick="login()">Login</button>
</div>

<script>
    // 1. Konfigurácia Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBAxjbusE-2s4pVUMS6kCow_8X6u5tX9gE",
        authDomain: "inno-intranet.firebaseapp.com",
        projectId: "inno-intranet",
        storageBucket: "inno-intranet.firebasestorage.app",
        messagingSenderId: "816972324613",
        appId: "1:816972324613:web:81429910b0de1e4cbda16c"
    };

    // 2. Inicializácia - TOTO JE KĽÚČOVÉ
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // 3. Funkcia prihlásenia
    async function login() {
        const email = document.getElementById("email").value.trim().toLowerCase();
        const password = document.getElementById("password").value;
        
        try {
            console.log("Prihlasujem užívateľa:", email);
            await auth.signInWithEmailAndPassword(email, password);
            console.log("Prihlásenie úspešné!");
            location.reload(); // Obnoví stránku po prihlásení
        } catch(e) {
            console.error("Chyba:", e.message);
            alert("Chyba prihlásenia: " + e.message);
        }
    }
</script>

</body>
</html>
