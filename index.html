<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INNO Intranet</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* LOGIN */
.login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.login-box {
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  width: 300px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  background: #334155;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

/* APP */
.app {
  display: none;
  height: 100vh;
}

.sidebar {
  width: 220px;
  background: #111827;
  padding: 20px;
  position: fixed;
  height: 100%;
}

.content {
  margin-left: 240px;
  padding: 20px;
}

.menu {
  margin: 10px 0;
  cursor: pointer;
  padding: 10px;
  border-radius: 8px;
}

.menu:hover {
  background: #1f2937;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-box">
    <h2>INNO Login</h2>

    <input id="email" placeholder="email@firma.sk">

    <input id="password" type="password" placeholder="heslo">

    <select id="role">
      <option value="user">User</option>
      <option value="admin">Admin</option>
      <option value="hr">HR Manager</option>
    </select>

    <button onclick="login()">Prihlásiť</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="sidebar">
    <h3>INNO</h3>

    <div class="menu" onclick="show('dashboard')">Dashboard</div>
    <div class="menu" onclick="show('docs')">Dokumenty</div>
    <div class="menu" onclick="show('hr')">HR</div>
    <div class="menu" onclick="show('admin')">Admin</div>
    <div class="menu" onclick="logout()">Logout</div>
  </div>

  <div class="content">

    <div id="dashboard">
      <h2>Dashboard</h2>
      <div class="card">Vitaj v systéme</div>
    </div>

    <div id="docs" style="display:none;">
      <h2>Dokumenty na prečítanie</h2>

      <div class="card">
        GDPR smernica 2026
        <br><br>
        <button onclick="readDoc(this)">Potvrdiť prečítanie</button>
      </div>

      <div class="card">
        BOZP smernica
        <br><br>
        <button onclick="readDoc(this)">Potvrdiť prečítanie</button>
      </div>
    </div>

    <div id="hr" style="display:none;">
      <h2>HR sekcia</h2>
      <div class="card">Mzdy: 🔒 iba HR</div>
      <div class="card">Zmluvy: 🔒 secret dokumenty</div>
    </div>

    <div id="admin" style="display:none;">
      <h2>Admin panel</h2>
      <div class="card">Správa userov</div>
      <div class="card">Edit dokumentov</div>
    </div>

  </div>
</div>

<script>

let currentUser = null;

function login() {
  const email = document.getElementById("email").value;
  const role = document.getElementById("role").value;

  currentUser = { email, role };

  localStorage.setItem("user", JSON.stringify(currentUser));

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  applyRole();
}

function applyRole() {
  if (currentUser.role === "user") {
    document.getElementById("admin").style.display = "none";
    document.getElementById("hr").style.display = "none";
  }

  if (currentUser.role === "hr") {
    document.getElementById("admin").style.display = "none";
  }
}

function show(id) {
  document.querySelectorAll(".content > div").forEach(d => d.style.display = "none");
  document.getElementById(id).style.display = "block";
}

function readDoc(btn) {
  btn.innerText = "✔ Prečítané";
  btn.disabled = true;
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

window.onload = function() {
  const saved = localStorage.getItem("user");

  if (saved) {
    currentUser = JSON.parse(saved);
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    applyRole();
  }
}

</script>

</body>
</html>
