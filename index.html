<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>INNO Intranet - Debug</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="login">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Heslo">
        <button onclick="login()">Login</button>
    </div>

<script>
    const firebaseConfig = { /* tvoja konfigurácia zostáva rovnaká */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function login() {
        const email = document.getElementById("email").value.trim().toLowerCase();
        const password = document.getElementById("password").value;
        
        try {
            console.log("Pokúšam sa prihlásiť:", email);
            const user = await firebase.auth().signInWithEmailAndPassword(email, password);
            console.log("Auth úspešná, hľadám profil v DB...");
            
            const snap = await db.collection("users").where("email", "==", email).get();
            
            if (snap.empty) {
                alert("Prihlásenie Auth OK, ale e-mail '" + email + "' nie je v tabuľke 'users'!");
            } else {
                alert("Všetko OK, profil nájdený!");
                location.reload();
            }
        } catch(e) {
            alert("Chyba: " + e.message);
        }
    }
</script>
</body>
</html>
