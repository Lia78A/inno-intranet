<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>INNO Intranet</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: white; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: #111827; height: 100vh; padding: 20px; box-sizing: border-box; }
        .menu-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #1e293b; }
        .menu-item:hover { color: #38bdf8; }
        
        /* Main Content */
        .main { flex-grow: 1; padding: 30px; }
        
        /* Header - Vpravo hore */
        .header { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .user-box { background: #1e293b; padding: 10px 20px; border-radius: 20px; border: 1px solid #334155; }
        
        #app { display: none; width: 100%; }
        .section { display: none; }
    </style>
</head>
<body>

<div id="login" style="width:100%; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div style="background:#1e293b; padding:40px; border-radius:12px;">
        <input id="email" placeholder="Email"><br>
        <input id="password" type="password" placeholder="Heslo"><br>
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <h3>INNO Intranet</h3>
        <div class="menu-item" onclick="show('dashboard')">Dashboard</div>
        <div class="menu-item" onclick="show('library')">Knižnica</div>
        <div class="menu-item" onclick="show('docs')">Dokumenty (ISO/ISMS)</div>
        <div class="menu-item" onclick="logout()" style="color:#ef4444;">Odhlásiť</div>
    </div>
    
    <div class="main">
        <div class="header">
            <div class="user-box" id="user-info">Načítavam...</div>
        </div>
        
        <div id="dashboard" class="section" style="display:block;"><h2>Dashboard</h2></div>
        <div id="library" class="section"><h2>Knižnica</h2></div>
        <div id="docs" class="section"><h2>Dokumenty</h2><div id="doc-list"></div></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAxjbusE-2s4pVUMS6kCow_8X6u5tX9gE",
        authDomain: "inno-intranet.firebaseapp.com",
        projectId: "inno-intranet",
        storageBucket: "inno-intranet.firebasestorage.app",
        messagingSenderId: "816972324613",
        appId: "1:816972324613:web:81429910b0de1e4cbda16c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            
            const snap = await db.collection("users").where("email", "==", user.email.toLowerCase()).get();
            if(!snap.empty) {
                const u = snap.docs[0].data();
                document.getElementById('user-info').innerText = `${u.name} (${u.role})`;
            }
        } else {
            document.getElementById('login').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    async function login() {
        try { await auth.signInWithEmailAndPassword(document.getElementById("email").value.trim().toLowerCase(), document.getElementById("password").value); }
        catch(e) { alert(e.message); }
    }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }
    function logout() { auth.signOut(); }
</script>
</body>
</html>
