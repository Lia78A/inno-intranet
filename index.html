<!-- LOGIN -->
<div id="login" class="login">
    <div class="box">
        <!-- Logo umiestnené nad poľami -->
        <div class="login-logo">
            <img src="inno_proj.png" alt="Logo firmy" style="width: 150px; display: block; margin: 0 auto 20px;">
        </div>
        
        <h2 style="text-align: center; color: white;">Prihlásenie</h2>
        
        <!-- Inputy sú vďaka CSS (flex-direction: column) automaticky pod sebou -->
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Heslo">
        <button type="button" onclick="login()">Login</button>
    </div>
</div>

<style>
    /* Upravený štýl pre box, aby boli prvky pod sebou */
    .box { 
        background: #1e293b; 
        padding: 30px; 
        border-radius: 12px; 
        width: 300px; 
        display: flex; 
        flex-direction: column; /* Toto zabezpečí, že všetko bude pod sebou */
        align-items: center;    /* Vycentrovanie loga a tlačidla */
    }
    .box input { 
        width: 100%; 
        padding: 12px; 
        margin: 8px 0; 
        border-radius: 8px; 
        border: none; 
        box-sizing: border-box; 
    }
    .box button { 
        width: 100%; 
        padding: 12px; 
        background: #2563eb; 
        border: none; 
        border-radius: 8px; 
        color: white; 
        cursor: pointer; 
        margin-top: 10px; 
    }
</style>
