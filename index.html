<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>INNO Intranet - Kompletný</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; }
        .login { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .box { background: #1e293b; padding: 40px; border-radius: 12px; width: 300px; display: flex; flex-direction: column; align-items: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563eb; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        
        #app { display: none; height: 100vh; display: flex; }
        .sidebar { width: 220px; background: #111827; padding: 20px; }
        .sidebar div { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .sidebar div:hover { background: #1e293b; }
        .content { flex-grow: 1; padding: 40px; }
        .section { display: none; }
    </style>
</head>
<body>

<div id="login" class="login">
    <div class="box">
        <h2>INNO Intranet</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Heslo">
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <h3>Menu</h3>
        <div onclick="show('dashboard')">Dashboard</div>
        <div onclick="show('hr')">HR a Mzdy</div>
        <div onclick="show('library')">Knižnica</div>
        <div onclick="show('docs')">Dokumenty</div>
        <div onclick="logout()" style="color:#ef4444; margin-top:20px;">Odhlásiť</div>
    </div>
    <div class="content">
        <div id="dashboard" class="section" style="display:block;"><h2>Dashboard</h2><p>Vitaj v systéme.</p></div>
        <div id="hr" class="section"><h2>HR a Mzdy</h2><p>Tu nájdeš mzdové podklady.</p></div>
        <div id="library" class="section"><h2>Knižnica</h2><p>Odborná literatúra a zdroje.</p></div>
        <div id="docs" class="section"><h2>Dokumenty</h2><div id="doc-list"></div></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBAxjbusE-2s4pVUMS6kCow_8X6u5tX9gE",
        authDomain: "inno-intranet.firebaseapp.com",
        projectId: "inno-intranet",
        storageBucket: "inno-intranet.firebasestorage.app",
        messagingSenderId: "816972324613",
        appId: "1:816972324613:web:81429910b0de1e4cbda16c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
        } else {
            document.getElementById('login').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    async function login() {
        try {
            await auth.signInWithEmailAndPassword(document.getElementById("email").value.trim().toLowerCase(), document.getElementById("password").value);
        } catch(e) { alert("Chyba: " + e.message); }
    }

    function show(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function logout() { auth.signOut(); }
</script>
</body>
</html>
