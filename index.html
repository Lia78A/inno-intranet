<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>INNO Intranet - Verzia 70</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: white; }
        .sidebar { width: 220px; background: #111827; height: 100vh; position: fixed; padding: 20px; }
        /* VIZITKA V SIDEBARE */
        .sidebar-user-card { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #334155; }
        .sidebar-user-name { font-weight: bold; color: white; }
        .sidebar-user-role { color: #38bdf8; font-size: 0.8em; text-transform: uppercase; }
        
        .menu { padding: 10px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .menu:hover { background: #1f2937; }
        .content { margin-left: 260px; padding: 20px; }
        #app { display: none; }
    </style>
</head>
<body>

<div id="login" style="height:100vh; display:flex; justify-content:center; align-items:center;">
    <div style="background:#1e293b; padding:40px; border-radius:12px;">
        <input id="email" placeholder="Email"><br>
        <input id="password" type="password" placeholder="Heslo"><br>
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="sidebar-user-card">
            <div id="sidebar-user-name" class="sidebar-user-name">Načítavam...</div>
            <div id="sidebar-user-role" class="sidebar-user-role">...</div>
        </div>
        <div class="menu" onclick="show('dashboard')">Dashboard</div>
        <div class="menu" onclick="show('docs')">Dokumenty</div>
        <div class="menu" onclick="logout()" style="color:#ef4444;">Odhlásiť</div>
    </div>
    <div class="content">
        <div id="dashboard"><h2>Dashboard</h2><div id="welcome"></div></div>
        <div id="docs" style="display:none;"><h2>Dokumenty</h2><div id="doc-list"></div></div>
    </div>
</div>

<script>
    const firebaseConfig = { /* tvoja config */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            setupUser(user.email.toLowerCase());
        } else {
            document.getElementById('login').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    async function setupUser(email) {
        const snap = await db.collection("users").where("email", "==", email).get();
        if (!snap.empty) {
            const user = snap.docs[0].data();
            // Zobrazenie mena a role
            document.getElementById('sidebar-user-name').innerText = user.name || email.split('@')[0];
            document.getElementById('sidebar-user-role').innerText = user.role;
            document.getElementById('welcome').innerText = "Vitaj, " + (user.name || email);
            loadDocs();
        }
    }

    // ... (zvyšok funkcií ako loadDocs, login, logout zostáva) ...
</script>
</body>
</html>
